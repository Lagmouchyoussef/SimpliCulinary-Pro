{% extends 'base/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - SimpliCulinary{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 border p-4 bg-light shadow rounded">
            <h2 class="py-3 text-center">Login</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <p class="mt-3 text-center">New here? <a href="{% url 'signup' %}">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
