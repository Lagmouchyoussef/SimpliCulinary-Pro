{% extends 'base/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Signup - SimpliCulinary{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 border p-4 bg-light shadow rounded">
            <h2 class="py-3 text-center">Signup</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <p class="mt-3 text-center">Already have an account? <a href="{% url 'login' %}">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
